<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Camera Bookmarks</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Camera Bookmarks</h1>
      <span id="status">connecting…</span>
    </header>

    <button id="pickBtn">Choose Target Tab…</button>
    <div id="targetLabel" class="target-label">No target selected</div>

    <button id="placeBtn" disabled>+ Place Camera Here</button>

    <ul id="cameraList"></ul>

    <div id="pip">
      <div id="pipHeader">
        <span id="pipTitle">No camera selected</span>
        <button id="refreshPipBtn">Refresh</button>
      </div>
      <div id="pipStatus"></div>
      <img id="pipImg" style="display:none" />
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
